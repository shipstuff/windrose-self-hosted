name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x -S warning \
            scripts/entrypoint.sh \
            bare-linux/install.sh \
            scripts/pack-windowsserver.sh

  python-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Syntax-check UI server
        run: python3 -m py_compile server.py scripts/patch-idle-cpu.py

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Backup retention tests
        run: python3 tests/test_retention.py
      - name: Backup create/restore round-trip tests
        run: python3 tests/test_restore.py
      - name: Auto-backup scheduler tests
        run: python3 tests/test_auto_backup.py
      - name: Server-control (systemctl dispatch) tests
        run: python3 tests/test_server_control.py
      - name: ServerDescription schema tests
        run: python3 tests/test_schema.py
      - name: HTTP integration tests
        run: python3 tests/test_http.py
      - name: install.sh env-merge regression
        run: bash tests/test_install_env_merge.sh
      - name: Engine.ini reconcile (NetServerMaxTickRate + t.MaxFPS)
        run: bash tests/test_engine_ini_reconcile.sh
      - name: ServerDescription shadow-stamp contract
        run: bash tests/test_shadow_stamp.sh

  compose-validate:
    # Validates docker-compose.yaml parses cleanly with env-var
    # substitution applied — catches broken `${VAR:-default}` syntax,
    # missing keys, malformed volume/depends_on refs before an
    # operator trips on them. Does NOT spin up containers: that would
    # need a 3 GB SteamCMD pull + ~3 min per CI run for marginal
    # coverage beyond what the k8s canary rollout already exercises.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose config --quiet
      - name: verify persistent volumes are declared
        run: |
          # Guard against a regression where someone deletes the
          # top-level `volumes:` block. Without named volumes, a
          # `docker compose down` would lose save data.
          docker compose config | grep -q "^volumes:" || {
            echo "::error::docker-compose.yaml is missing named volumes — saves would not persist across down/up"
            exit 1
          }
          docker compose config | grep -q "windrose-data" || {
            echo "::error::windrose-data named volume missing — /home/steam would be ephemeral"
            exit 1
          }

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install yamllint
      - name: yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: disable, indentation: {spaces: 2, check-multi-line-strings: false}, document-start: disable, braces: disable, brackets: disable, comments: disable}}' \
            namespace.yaml pvc.yaml statefulset.yaml service.yaml docker-compose.yaml kustomization.yaml

  json-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate example JSON
        run: |
          python3 -c "import json,sys; [json.load(open(f)) for f in ['scripts/ServerDescription_example.json','scripts/WorldDescription_example.json']]"

  kustomize-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -sqL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
      - run: kustomize build . >/dev/null

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Render chart
        run: |
          helm lint ./helm/windrose
          helm template windrose ./helm/windrose >/dev/null
          helm template windrose ./helm/windrose --set serverConfig.mode=managed >/dev/null
          helm template windrose ./helm/windrose --set serverConfig.mode=mutable >/dev/null
